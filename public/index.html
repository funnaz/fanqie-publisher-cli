<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>番茄发布助手</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>番茄发布助手</h1>
        <p>本地章节上传、草稿发布、进度追踪</p>
      </div>
      <div id="jobState" class="state idle">空闲</div>
    </header>

    <section class="panel grid">
      <label>章节目录
        <input id="chapters" placeholder="C:\Users\...\某本书\chapters">
      </label>
      <label>书名
        <input id="book" placeholder="自动从目录推断">
      </label>
      <label>开始章节
        <input id="start" type="number" value="1" min="1">
      </label>
      <label>结束章节
        <input id="end" type="number" value="3" min="1">
      </label>
      <label>模式
        <select id="mode">
          <option value="draft">上传草稿</option>
          <option value="publish-drafts">发布草稿箱</option>
          <option value="dry-run">本地检查</option>
          <option value="upload-and-publish">直接发布（先上传再发布）</option>
          <option value="publish">仅当前页发布</option>
        </select>
      </label>
      <label>每 N 章暂停
        <input id="confirmEvery" type="number" value="5" min="0">
      </label>
      <label>最低字数
        <input id="minChars" type="number" value="950" min="0">
      </label>
      <label>作品后台 URL
        <input id="targetUrl" placeholder="章节管理/草稿箱或新建章节页面 URL">
      </label>
      <label>新建章节 URL
        <input id="newUrl" placeholder="可选">
      </label>
    </section>

    <section class="panel options">
      <label><input id="confirmEach" type="checkbox"> 每章确认</label>
      <label><input id="reset" type="checkbox" checked> 重置当前范围断点</label>
      <label><input id="noStrictQuality" type="checkbox"> 忽略质量警告</label>
      <label><input id="inspectPage" type="checkbox"> 页面诊断</label>
    </section>

    <section class="actions">
      <button id="startBtn" class="primary">开始任务</button>
      <button id="continueBtn">继续 / 回车</button>
      <button id="stopBtn" class="danger">停止</button>
      <button id="refreshBtn">刷新进度</button>
    </section>

    <section class="panel">
      <h2>定时发布</h2>
      <div class="scheduler">
        <label>间隔
          <select id="intervalMinutes">
            <option value="2">2 分钟</option>
            <option value="30">30 分钟</option>
            <option value="60">60 分钟</option>
            <option value="120">120 分钟</option>
            <option value="240">240 分钟</option>
          </select>
        </label>
        <label>定时模式
          <select id="scheduleMode">
            <option value="publish-drafts">发布草稿箱</option>
            <option value="upload-and-publish">上传并发布</option>
          </select>
        </label>
        <label>每次发布章节数
          <input id="batchSize" type="number" value="1" min="1">
        </label>
        <label>截止章节
          <input id="maxChapter" type="number" value="40" min="1">
        </label>
        <button id="scheduleBtn" class="primary">创建定时发布</button>
      </div>
      <div id="schedules" class="schedule-list"></div>
    </section>

    <section class="panel">
      <button id="historyToggle" class="secondary full-width" type="button">展开定时任务历史</button>
      <div id="historyPanel" class="history-panel hidden">
        <div id="scheduleHistory" class="history-list"></div>
      </div>
    </section>

    <section class="cards">
      <article class="panel">
        <h2>进度</h2>
        <div id="progress"></div>
      </article>
      <article class="panel">
        <h2>当前任务</h2>
        <pre id="jobInfo">暂无任务</pre>
      </article>
    </section>

    <section class="panel">
      <h2>实时日志</h2>
      <pre id="logs" class="logs"></pre>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
